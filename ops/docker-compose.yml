services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: motis
      POSTGRES_USER: motis
      POSTGRES_PASSWORD: motis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motis -d motis"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: ops/docker/api.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://motis:motis@postgres:5432/motis}
      APP_DATA_DIR: ${APP_DATA_DIR:-/app/.data}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      PYTHONPATH: /app/packages/strategy_sdk/src:/app/apps/api/src:/app/apps/worker/src
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-data:/app/.data

  worker:
    build:
      context: ..
      dockerfile: ops/docker/worker.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://motis:motis@postgres:5432/motis}
      APP_DATA_DIR: ${APP_DATA_DIR:-/app/.data}
      OKX_BACKEND: ${OKX_BACKEND:-okx_cli}
      OKX_CLI_PATH: ${OKX_CLI_PATH:-okx}
      OKX_PROFILE: ${OKX_PROFILE:-}
      OKX_MODE: ${OKX_MODE:-demo}
      OKX_API_KEY: ${OKX_API_KEY:-}
      OKX_API_SECRET: ${OKX_API_SECRET:-}
      OKX_PASSPHRASE: ${OKX_PASSPHRASE:-}
      PYTHONPATH: /app/packages/strategy_sdk/src:/app/apps/api/src:/app/apps/worker/src
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-data:/app/.data

  web:
    build:
      context: ..
      dockerfile: ops/docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
  app-data:
